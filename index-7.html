// ── DB ──
let _userId = null;
let _store = {};
let _listeners = {};
let _dirty = {};
let _debounces = {};

function dbListen(key, fn) {
  if (!_listeners[key]) _listeners[key] = [];
  _listeners[key].push(fn);
  return () => { _listeners[key] = _listeners[key].filter(f => f !== fn); };
}

function dbNotify(key) {
  (_listeners[key] || []).forEach(fn => fn(_store[key]));
}

function dbGet(key, def) {
  return _store[key] !== undefined ? _store[key] : def;
}

function dbSet(key, valOrFn) {
  const prev = _store[key];
  const next = typeof valOrFn === 'function' ? valOrFn(prev) : valOrFn;
  _store[key] = next;
  try { localStorage.setItem('los8_' + key, JSON.stringify(next)); } catch(e) {}
  dbNotify(key);
  clearTimeout(_debounces[key]);
  _debounces[key] = setTimeout(() => pushKey(key, next), 1500);
}

function pushKey(key, val) {
  if (!_userId) return;
  const patch = {};
  patch[key] = val;
  sb.from('lifeos_data').upsert({
    user_id: _userId,
    data: Object.assign({}, _store),
    updated_at: new Date().toISOString()
  }).then(() => {}).catch(() => {});
}

function loadStore(userId) {
  _userId = userId;
  return new Promise((resolve) => {
    // first load from localStorage
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('los8_')) {
        try { _store[k.slice(5)] = JSON.parse(localStorage.getItem(k)); } catch(e) {}
      }
    }
    // then override with cloud data
    sb.from('lifeos_data').select('data').eq('user_id', userId).single()
      .then(({data, error}) => {
        if (data && data.data) {
          Object.assign(_store, data.data);
          // sync back to localStorage
          Object.keys(_store).forEach(k => {
            try { localStorage.setItem('los8_' + k, JSON.stringify(_store[k])); } catch(e) {}
          });
        }
        resolve();
      })
      .catch(() => resolve());
  });
}

// ── HOOK ──
function useDb(key, def) {
  const [val, setVal] = useState(() => dbGet(key, def));
  useEffect(() => {
    setVal(dbGet(key, def));
    return dbListen(key, (v) => setVal(v !== undefined ? v : def));
  }, [key]);
  const set = useCallback((v) => dbSet(key, v), [key]);
  return [val, set];
}

// ══ AUTH ══
function Auth({onAuth}) {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  const submit = () => {
    if (!email || !pass) { setErr('Fill in both fields'); return; }
    setBusy(true); setErr('');
    const fn = mode==='login'
      ? sb.auth.signInWithPassword({email, password:pass})
      : sb.auth.signUp({email, password:pass});
    fn.then(({data, error}) => {
      setBusy(false);
      if (error) { setErr(error.message); return; }
      if (data.user) { onAuth(data.user); }
      else setErr('Check your email to confirm, then log in.');
    }).catch(e => { setBusy(false); setErr(e.message||'Error'); });
  };

  return (
    <div style={{height:'100vh',background:BG,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,overflowY:'auto'}}>

  const save=()=>{setProjects(p=>(p||[]).map(x=>x.id===editing?{...draft,id:editing,total:Number(draft.total),done:Number(draft.done)}:x));setEditing(null);};

        </Card>
      );})}
      {arr.length===0&&<Card style={{textAlign:'center',color:DIM,fontSize:13,padding:28}}>No projects 🗂</Card>}
    </div>
  );
}

      </>}
    </div>
  );
}

      {adding&&<Card style={{borderColor:A+'30',display:'flex',flexDirection:'column',gap:8}}><SL>New Skill</SL><TInput value={newS.name} onChange={e=>setNewS(s=>({...s,name:e.target.value}))} placeholder="Skill name"/><div style={{display:'flex',gap:7}}><TSelect value={newS.cat} onChange={e=>setNewS(s=>({...s,cat:e.target.value}))} options={SKILL_CATS} style={{flex:1}}/><TSelect value={newS.level} onChange={e=>setNewS(s=>({...s,level:Number(e.target.value)}))} options={[1,2,3,4,5]} style={{width:80}}/></div><TInput value={newS.note} onChange={e=>setNewS(s=>({...s,note:e.target.value}))} placeholder="Note / plan"/><div style={{display:'flex',alignItems:'center',gap:8}}><input type="checkbox" checked={newS.learning} onChange={e=>setNewS(s=>({...s,learning:e.target.checked}))} id="lrn" style={{accentColor:A}}/><label htmlFor="lrn" style={{fontSize:12,color:DIM}}>Currently learning</label></div><div style={{display:'flex',gap:7}}><Btn onClick={add} style={{flex:1}}>+ Add</Btn><Btn onClick={()=>setAdding(false)} v="g">Cancel</Btn></div></Card>}
      {cats.map(cat=><div key={cat}><SL>{cat}</SL><div style={{display:'flex',flexDirection:'column',gap:8}}>{arr.filter(s=>s.cat===cat).map(s=>editing===s.id?(
        <Card key={s.id} style={{borderColor:A+'30',display:'flex',flexDirection:'column',gap:8}}><TInput value={draft.name} onChange={e=>setDraft(d=>({...d,name:e.target.value}))} placeholder="Skill name"/><div style={{display:'flex',gap:7}}><TSelect value={draft.cat} onChange={e=>setDraft(d=>({...d,cat:e.target.value}))} options={SKILL_CATS} style={{flex:1}}/><TSelect value={draft.level} onChange={e=>setDraft(d=>({...d,level:Number(e.target.value)}))} options={[1,2,3,4,5]} style={{width:80}}/></div><TInput value={draft.note} onChange={e=>setDraft(d=>({...d,note:e.target.value}))} placeholder="Note"/><div style={{display:'flex',alignItems:'center',gap:8}}><input type="checkbox" checked={draft.learning} onChange={e=>setDraft(d=>({...d,learning:e.target.checked}))} style={{accentColor:A}}/><span style={{fontSize:12,color:DIM}}>Currently learning</span></div><div style={{display:'flex',gap:7}}><Btn onClick={save} style={{flex:1}}>Save</Btn><Btn onClick={()=>setEditing(null)} v="g">Cancel</Btn></div></Card>
      ):(
        <Card key={s.id} style={{borderLeft:`3px solid ${SL_CLR[s.level-1]}60`}}>
          <div style={{display:'flex',alignItems:'flex-start',gap:10}}>
            <div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:7,marginBottom:4}}><span style={{fontSize:13,fontWeight:700,color:TX}}>{s.name}</span>{s.learning&&<Pill color={A}>learning</Pill>}</div><div style={{display:'flex',gap:5,marginBottom:6}}>{[1,2,3,4,5].map(i=><div key={i} style={{width:28,height:8,borderRadius:4,background:i<=s.level?SL_CLR[s.level-1]:MU}}/>)}<span style={{fontSize:11,color:SL_CLR[s.level-1],fontWeight:700,marginLeft:4}}>{SL_LEVELS[s.level-1]}</span></div>{s.note&&<div style={{fontSize:11,color:DIM}}>{s.note}</div>}</div>
            <div style={{display:'flex',flexDirection:'column',gap:5,flexShrink:0}}><div style={{display:'flex',gap:5}}><button onClick={()=>bump(s.id,-1)} style={{background:'#ffffff08',border:'none',borderRadius:5,width:24,height:24,color:DIM,fontSize:13}}>−</button><button onClick={()=>bump(s.id,1)} style={{background:SL_CLR[s.level-1]+'20',border:'none',borderRadius:5,width:24,height:24,color:SL_CLR[s.level-1],fontSize:13}}>+</button></div><div style={{display:'flex',gap:5}}><Btn onClick={()=>se(s)} v="i" style={{fontSize:10,padding:'3px 7px'}}>✏️</Btn><Btn onClick={()=>del(s.id)} v="d" style={{fontSize:10,padding:'3px 7px'}}>✕</Btn></div></div>
          </div>
        </Card>
      ))}</div></div>)}
      {arr.length===0&&<Card style={{textAlign:'center',color:DIM,fontSize:13,padding:28}}>No skills yet 💪</Card>}
    </div>
  );
}

// ══ PEOPLE ══
const DEF_PEOPLE=[{id:1,name:'GF 💌',type:'Partner',lastTouched:'Today',note:'Anniversary planning in progress',birthday:'1999-08-14',phone:'',email:'',tasks:['Plan anniversary','Send good morning text']},{id:2,name:'Mom',type:'Family',lastTouched:'Today',note:'Need to call this week',birthday:'1970-03-22',phone:'',email:'',tasks:['Call this week']},{id:3,name:'Trisha',type:'Friend',lastTouched:'Today',note:'Check in on her thesis',birthday:'2000-11-05',phone:'',email:'',tasks:[]},{id:4,name:'Mark',type:'Mentor',lastTouched:'Today',note:'Schedule coffee meeting',birthday:'1985-07-30',phone:'',email:'',tasks:['Schedule coffee']}];
function PersonCard({person,onChange,onRemove}) {
  const [open,setOpen]=useState(false);const [ed,setEd]=useState(false);const [draft,setDraft]=useState(person);const [nt,setNt]=useState('');
  const col=TCOL[person.type]||DIM;
  const save=()=>{onChange(draft);setEd(false);};
  const addTask=()=>{if(!nt.trim())return;onChange({...person,tasks:[...(person.tasks||[]),nt.trim()]});setNt('');};
  const delTask=i=>onChange({...person,tasks:(person.tasks||[]).filter((_,idx)=>idx!==i)});
  return(
    <Card style={{borderLeft:`3px solid ${col}40`}}>
      <div style={{display:'flex',alignItems:'center',gap:11}}>
        <div style={{width:40,height:40,borderRadius:10,flexShrink:0,background:col+'20',border:`2px solid ${col}40`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,fontWeight:700,color:col}}>{person.name[0]||'?'}</div>
        <div style={{flex:1,minWidth:0}}><div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}><span style={{fontSize:14,fontWeight:700,color:TX}}>{person.name}</span><Pill color={col}>{person.type}</Pill></div><div style={{fontSize:11,color:DIM,marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{person.note||'No note'}</div></div>
        <div style={{textAlign:'right',flexShrink:0}}><div style={{fontSize:10,color:DIM}}>last touch</div><div style={{fontSize:12,fontWeight:700,color:person.lastTouched==='Today'?A:TX}}>{person.lastTouched}</div></div>
        <button onClick={()=>setOpen(o=>!o)} style={{background:'#ffffff08',border:'none',borderRadius:6,padding:'4px 8px',color:DIM,fontSize:12}}>{open?'▲':'▼'}</button>
      </div>
      {open&&<div style={{marginTop:12,paddingTop:12,borderTop:'1px solid #ffffff08'}}>
        {ed?(<div style={{display:'flex',flexDirection:'column',gap:7}}>
          <div style={{display:'flex',gap:7}}><TInput value={draft.name} onChange={e=>setDraft(d=>({...d,name:e.target.value}))} placeholder="Name" style={{flex:1}}/><TSelect value={draft.type} onChange={e=>setDraft(d=>({...d,type:e.target.value}))} options={Object.keys(TCOL)} style={{width:110}}/></div>
          <TSelect value={draft.lastTouched} onChange={e=>setDraft(d=>({...d,lastTouched:e.target.value}))} options={TOUCH}/>
          <TInput value={draft.note} onChange={e=>setDraft(d=>({...d,note:e.target.value}))} placeholder="Note"/>
          <TInput value={draft.birthday} onChange={e=>setDraft(d=>({...d,birthday:e.target.value}))} type="date"/>
          <TInput value={draft.phone} onChange={e=>setDraft(d=>({...d,phone:e.target.value}))} placeholder="Phone"/>
          <TInput value={draft.email} onChange={e=>setDraft(d=>({...d,email:e.target.value}))} placeholder="Email"/>
          <div style={{display:'flex',gap:7}}><Btn onClick={save} style={{flex:1}}>Save</Btn><Btn onClick={()=>setEd(false)} v="g">Cancel</Btn></div>
        </div>):(<div style={{display:'flex',flexDirection:'column',gap:9}}>
          <div style={{display:'flex',flexDirection:'column',gap:5}}>
            {person.birthday&&<div style={{display:'flex',gap:8,fontSize:12}}><span>🎂</span><span style={{color:TX}}>{new Date(person.birthday+'T00:00:00').toLocaleDateString('en-PH',{month:'long',day:'numeric',year:'numeric'})}</span></div>}
            {person.phone&&<div style={{display:'flex',gap:8,fontSize:12}}><span>📞</span><span style={{color:TX}}>{person.phone}</span></div>}
            {person.email&&<div style={{display:'flex',gap:8,fontSize:12}}><span>✉️</span><span style={{color:TX}}>{person.email}</span></div>}
          </div>
          <div><div style={{fontSize:10,color:DIM,letterSpacing:2,textTransform:'uppercase',marginBottom:7,fontWeight:600}}>Tasks</div>
            {(person.tasks||[]).map((t,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',background:P2,borderRadius:7,marginBottom:5}}><span style={{flex:1,fontSize:12,color:TX}}>{t}</span><Btn onClick={()=>delTask(i)} v="d" style={{padding:'2px 7px'}}>×</Btn></div>)}
            <div style={{display:'flex',gap:7,marginTop:5}}><TInput value={nt} onChange={e=>setNt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addTask()} placeholder="Add a task..." style={{flex:1}}/><Btn onClick={addTask} style={{padding:'8px 11px'}}>+</Btn></div>
          </div>
          <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
            <Btn onClick={()=>onChange({...person,lastTouched:'Today'})} v="g" style={{fontSize:11}}>✓ Touched today</Btn>
            <Btn onClick={()=>{setDraft(person);setEd(true);}} v="g" style={{fontSize:11}}>✏️ Edit</Btn>
            <Btn onClick={onRemove} v="d" style={{fontSize:11}}>Remove</Btn>
          </div>
        </div>)}
      </div>}
    </Card>
  );
}
function People() {
  const [people,setPeople]=useDb('people',DEF_PEOPLE);
  const [bdays,setBdays]=useDb('bdays',[]);
  const [view,setView]=useState('contacts');const [addOpen,setAddOpen]=useState(false);const [newP,setNewP]=useState({name:'',type:'Friend',lastTouched:'Today',note:'',birthday:'',phone:'',email:'',tasks:[]});
  const [addBday,setAddBday]=useState(false);const [editBId,setEditBId]=useState(null);const [newBday,setNewBday]=useState({name:'',birthday:'',type:'Friend'});const [bdraft,setBdraft]=useState({});
  const pArr=people||[];const bArr=bdays||[];
  const update=(id,u)=>setPeople(p=>(p||[]).map(x=>x.id===id?{...u,id}:x));
  const remove=id=>setPeople(p=>(p||[]).filter(x=>x.id!==id));
  const addPerson=()=>{if(!newP.name.trim())return;setPeople(p=>[...(p||[]),{...newP,id:Date.now(),tasks:[]}]);setNewP({name:'',type:'Friend',lastTouched:'Today',note:'',birthday:'',phone:'',email:'',tasks:[]});setAddOpen(false);};
  const saveBday=()=>{setBdays(b=>(b||[]).map(x=>x.id===editBId?{...bdraft,id:editBId}:x));setEditBId(null);};
  const delBday=id=>setBdays(b=>(b||[]).filter(x=>x.id!==id));
  const addBE=()=>{if(!newBday.name.trim()||!newBday.birthday)return;setBdays(b=>[...(b||[]),{...newBday,id:Date.now()}]);setNewBday({name:'',birthday:'',type:'Friend'});setAddBday(false);};
  const today=new Date();
  const allBdays=[...pArr.filter(p=>p.birthday).map(p=>({id:p.id,name:p.name,birthday:p.birthday,type:p.type,isContact:true})),...bArr.map(b=>({...b,isContact:false}))].map(p=>{const bd=new Date(p.birthday+'T00:00:00');const next=new Date(today.getFullYear(),bd.getMonth(),bd.getDate());if(next<today)next.setFullYear(today.getFullYear()+1);const days=Math.round((next-today)/86400000);const age=today.getFullYear()-bd.getFullYear()-(today<next?1:0);return{...p,days,age};}).sort((a,b)=>a.days-b.days);
  return(
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',gap:6}}>{['contacts','birthdays'].map(t=><button key={t} onClick={()=>setView(t)} style={{flex:1,padding:'8px 0',borderRadius:10,border:'none',background:view===t?A:P2,color:view===t?'#000':DIM,fontWeight:view===t?800:500,fontSize:12}}>{t==='contacts'?'👥 Contacts':'🎂 Birthdays'}</button>)}</div>
      {view==='contacts'&&<>
        <div style={{fontSize:10,color:DIM,letterSpacing:3,textTransform:'uppercase',marginBottom:4,fontWeight:600}}>{pArr.length} contacts · tap ▼ to expand</div>
        {pArr.map(p=><PersonCard key={p.id} person={p} onChange={u=>update(p.id,u)} onRemove={()=>remove(p.id)}/>)}
        {addOpen?<Card style={{borderColor:A+'30',display:'flex',flexDirection:'column',gap:7}}><SL>New Contact</SL><div style={{display:'flex',gap:7}}><TInput value={newP.name} onChange={e=>setNewP(p=>({...p,name:e.target.value}))} placeholder="Name" style={{flex:1}}/><TSelect value={newP.type} onChange={e=>setNewP(p=>({...p,type:e.target.value}))} options={Object.keys(TCOL)} style={{width:110}}/></div><TInput value={newP.birthday} onChange={e=>setNewP(p=>({...p,birthday:e.target.value}))} type="date"/><TInput value={newP.phone} onChange={e=>setNewP(p=>({...p,phone:e.target.value}))} placeholder="Phone"/><TInput value={newP.email} onChange={e=>setNewP(p=>({...p,email:e.target.value}))} placeholder="Email"/><TInput value={newP.note} onChange={e=>setNewP(p=>({...p,note:e.target.value}))} placeholder="Note"/><div style={{display:'flex',gap:7}}><Btn onClick={addPerson} style={{flex:1}}>+ Add Contact</Btn><Btn onClick={()=>setAddOpen(false)} v="g">Cancel</Btn></div></Card>:<DAdd onClick={()=>setAddOpen(true)} label="+ Add contact"/>}
      </>}
      {view==='birthdays'&&<>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><SL mb={0}>Upcoming Birthdays</SL><Btn onClick={()=>setAddBday(a=>!a)} v="g" style={{fontSize:11,padding:'5px 11px'}}>+ Add birthday</Btn></div>
        {addBday&&<Card style={{borderColor:A+'30',display:'flex',flexDirection:'column',gap:8}}><SL>New Birthday</SL><TInput value={newBday.name} onChange={e=>setNewBday(b=>({...b,name:e.target.value}))} placeholder="Name"/><TInput value={newBday.birthday} onChange={e=>setNewBday(b=>({...b,birthday:e.target.value}))} type="date"/><TSelect value={newBday.type} onChange={e=>setNewBday(b=>({...b,type:e.target.value}))} options={Object.keys(TCOL)}/><div style={{display:'flex',gap:7}}><Btn onClick={addBE} style={{flex:1}}>+ Add</Btn><Btn onClick={()=>setAddBday(false)} v="g">Cancel</Btn></div></Card>}
        {allBdays.length===0&&<Card style={{textAlign:'center',color:DIM,fontSize:13,padding:24}}>No birthdays yet 🎂</Card>}
        {allBdays.map(p=>editBId===p.id&&!p.isContact?(
          <Card key={p.id} style={{borderColor:A+'30',display:'flex',flexDirection:'column',gap:8}}><SL>Edit Birthday</SL><TInput value={bdraft.name} onChange={e=>setBdraft(d=>({...d,name:e.target.value}))} placeholder="Name"/><TInput value={bdraft.birthday} onChange={e=>setBdraft(d=>({...d,birthday:e.target.value}))} type="date"/><TSelect value={bdraft.type} onChange={e=>setBdraft(d=>({...d,type:e.target.value}))} options={Object.keys(TCOL)}/><div style={{display:'flex',gap:7}}><Btn onClick={saveBday} style={{flex:1}}>Save</Btn><Btn onClick={()=>setEditBId(null)} v="g">Cancel</Btn></div></Card>
        ):(
          <Card key={p.id} style={{display:'flex',alignItems:'center',gap:13,borderLeft:`3px solid ${TCOL[p.type]||DIM}`}}>
            <div style={{textAlign:'center',minWidth:44}}><div style={{fontSize:21,fontWeight:900,color:p.days<=7?A:TX}}>{p.days}</div><div style={{fontSize:9,color:DIM,letterSpacing:1}}>DAYS</div></div>
            <div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:7,marginBottom:2,flexWrap:'wrap'}}><span style={{fontSize:14,fontWeight:700,color:TX}}>{p.name}</span>{p.days===0&&<span style={{fontSize:10,background:A+'20',color:A,padding:'2px 7px',borderRadius:99,fontWeight:700}}>TODAY 🎉</span>}{p.days<=7&&p.days>0&&<span style={{fontSize:10,background:'#ffd16620',color:'#ffd166',padding:'2px 7px',borderRadius:99,fontWeight:700}}>soon!</span>}{p.isContact&&<Pill color={DIM}>contact</Pill>}</div><div style={{fontSize:11,color:DIM}}>{new Date(p.birthday+'T00:00:00').toLocaleDateString('en-PH',{month:'long',day:'numeric'})} · turning {p.age+1}</div></div>
            <div style={{display:'flex',flexDirection:'column',gap:5,alignItems:'flex-end'}}><div style={{fontSize:22}}>🎂</div>{!p.isContact&&<div style={{display:'flex',gap:5}}><Btn onClick={()=>{setBdraft({name:p.name,birthday:p.birthday,type:p.type});setEditBId(p.id);}} v="i" style={{fontSize:10,padding:'3px 7px'}}>✏️</Btn><Btn onClick={()=>delBday(p.id)} v="d" style={{fontSize:10,padding:'3px 7px'}}>✕</Btn></div>}{p.isContact&&<span style={{fontSize:10,color:DIM}}>edit in Contacts</span>}</div>
          </Card>
        ))}
      </>}
    </div>
  );
}

// ══ MAIN APP ══
const NAV=[{id:'home',icon:'⌂',label:'Home'},{id:'habits',icon:'🔥',label:'Habits'},{id:'routine',icon:'◷',label:'Routine'},{id:'mind',icon:'◈',label:'Mind'},{id:'goals',icon:'◎',label:'Goals'},{id:'kanban',icon:'▦',label:'Kanban'},{id:'projects',icon:'◩',label:'Projects'},{id:'journal',icon:'◻',label:'Journal'},{id:'finance',icon:'◬',label:'Finance'},{id:'skills',icon:'★',label:'Skills'},{id:'people',icon:'❋',label:'People'}];
const PAGES={home:Home,habits:Habits,routine:Routine,mind:Mind,goals:Goals,kanban:Kanban,projects:Projects,journal:Journal,finance:Finance,skills:Skills,people:People};

function MainApp({user}) {
  const [active, setActive] = useState('home');
  const [loaded, setLoaded] = useState(false);
  const [syncSt, setSyncSt] = useState('loading');

  useEffect(() => {
    setSyncSt('loading');
    loadStore(user.id).then(() => {
      setLoaded(true);
      setSyncSt('synced');
    });
  }, [user.id]);

  if (!loaded) return (
    <div style={{height:'100vh',background:BG,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}>
      <div style={{fontSize:13,color:DIM}}>Loading your data...</div>
    </div>
  );

  const Page = PAGES[active] || Home;
  const syncColor = syncSt==='saving'?'#ffd166':syncSt==='synced'?A:'#ff6b6b';
  const syncIcon = syncSt==='saving'?'⟳':syncSt==='synced'?'✓':'!';

  return (
    <div id="root" style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden',background:BG}}>
      <div className="topbar">
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:24,height:24,background:A,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:900,color:'#000'}}>J</div>
          <span style={{fontSize:12,fontWeight:700,color:TX,letterSpacing:1}}>JJOO'S LIFE OS</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:10,color:syncColor,fontWeight:700}}>{syncIcon} {syncSt}</span>
          <button onClick={()=>sb.auth.signOut().then(()=>window.location.reload())} style={{background:'#ffffff08',border:'none',borderRadius:6,padding:'4px 10px',color:DIM,fontSize:11}}>Sign out</button>
        </div>
      </div>
      <div className="nav">
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setActive(n.id)} style={{display:'flex',alignItems:'center',gap:5,padding:'6px 10px',borderRadius:8,border:'none',background:active===n.id?A:'transparent',color:active===n.id?'#000':DIM,fontWeight:active===n.id?800:500,fontSize:11,whiteSpace:'nowrap',flexShrink:0}}>
            <span>{n.icon}</span><span>{n.label}</span>
          </button>
        ))}
      </div>
      <div className="page">
        <Page/>
      </div>
      <div className="bottombar">
        <span>Life OS v9.0</span><span>11 sections · ☁️ synced</span>
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    sb.auth.getSession().then(({data}) => {
      setUser(data.session?.user || null);
      setChecking(false);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_, session) => {
      setUser(session?.user || null);
    });
    return () => subscription.unsubscribe();
  }, []);

  if (checking) return <div style={{height:'100vh',background:BG,display:'flex',alignItems:'center',justifyContent:'center',color:DIM,fontSize:13}}>Loading...</div>;
  if (!user) return <Auth onAuth={setUser}/>;
  return <MainApp user={user}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
