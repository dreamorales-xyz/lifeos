// ── SYNC ENGINE ──
// All data lives in one row per user in lifeos_data table
// Schema: user_id text PK, data jsonb, updated_at timestamp
function useSync(userId) {
  const [store, setStoreRaw] = useState({});
  const [synced, setSynced] = useState(false);
  const [syncStatus, setSyncStatus] = useState("loading");
  const debounceRef = useRef({});

  // Load from Supabase on mount
  useEffect(() => {
    if (!userId) return;
    (async () => {
      try {
        const { data, error } = await sb.from("lifeos_data").select("data").eq("user_id", userId).single();
        if (error && error.code !== "PGRST116") throw error;
        const loaded = data?.data || {};
        // also merge localStorage as fallback
        const local = {};
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k.startsWith("los7_")) {
            try { local[k.slice(5)] = JSON.parse(localStorage.getItem(k)); } catch {}
          }
        }
        setStoreRaw({ ...local, ...loaded });
        setSynced(true);
        setSyncStatus("synced");
      } catch (e) {
        console.error("Load error", e);
        // fallback to localStorage
        const local = {};
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k.startsWith("los7_")) {
            try { local[k.slice(5)] = JSON.parse(localStorage.getItem(k)); } catch {}
          }
        }
        setStoreRaw(local);
        setSynced(true);
        setSyncStatus("offline");
      }
    })();
  }, [userId]);

  const pushToCloud = useCallback(async (newStore) => {
    if (!userId) return;
    setSyncStatus("saving");
    try {
      await sb.from("lifeos_data").upsert({ user_id: userId, data: newStore, updated_at: new Date().toISOString() });
      setSyncStatus("synced");
    } catch {
      setSyncStatus("offline");
    }
  }, [userId]);

  const setKey = useCallback((key, valOrFn) => {
    setStoreRaw(prev => {
      const val = typeof valOrFn === "function" ? valOrFn(prev[key]) : valOrFn;
      const next = { ...prev, [key]: val };
      // save to localStorage immediately
      try { localStorage.setItem("los7_" + key, JSON.stringify(val)); } catch {}
      // debounce cloud push per key (1.5s)
      clearTimeout(debounceRef.current[key]);
      debounceRef.current[key] = setTimeout(() => pushToCloud(next), 1500);
      return next;
    });
  }, [pushToCloud]);

  const get = useCallback((key, def) => {
    return store[key] !== undefined ? store[key] : def;
  }, [store]);

  return { get, setKey, synced, syncStatus };
}

// ── usePersist shim ──
// Components use this just like before
function makePersist(syncCtx) {
  return function usePersist(key, def) {
    const val = syncCtx.get(key, def);
    const set = useCallback(v => syncCtx.setKey(key, v), [key]);
    return [val, set];
  };
}

function TArea({value,onChange,placeholder,rows=3}){return <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows} style={{background:P2,border:"1px solid #ffffff14",borderRadius:8,padding:"8px 11px",color:TX,fontSize:12,outline:"none",fontFamily:"inherit",width:"100%",boxSizing:"border-box",resize:"vertical"}}/>;}
function TSelect({value,onChange,options,style}){return <select value={value} onChange={onChange} style={{background:P2,border:"1px solid #ffffff14",borderRadius:8,padding:"8px 11px",color:TX,fontSize:12,fontFamily:"inherit",width:"100%",boxSizing:"border-box",...style}}>{options.map(o=><option key={o}>{o}</option>)}</select>;}
function Btn({onClick,children,variant="primary",style}){const m={primary:{background:A,color:"#000"},ghost:{background:"#ffffff0a",color:DIM},danger:{background:"#ff6b6b18",color:"#ff6b6b"},icon:{background:"#ffffff08",color:DIM}};return <button onClick={onClick} style={{border:"none",borderRadius:8,padding:"8px 13px",fontWeight:700,cursor:"pointer",fontSize:12,fontFamily:"inherit",...m[variant],...style}}>{children}</button>;}
function DashedAdd({onClick,label="+ Add"}){return <button onClick={onClick} style={{background:"transparent",border:`1.5px dashed ${MU}`,borderRadius:12,padding:"11px",color:DIM,cursor:"pointer",fontSize:13,fontFamily:"inherit",width:"100%"}}>{label}</button>;}
function Row2({icon,val}){return <div style={{display:"flex",gap:8,alignItems:"center",fontSize:12}}><span>{icon}</span><span style={{color:TX}}>{val}</span></div>;}

// ── AUTH SCREEN ──
function AuthScreen({onAuth}){
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const submit=async()=>{
    if(!email||!pass){setErr("Fill in both fields");return;}
    setLoading(true);setErr("");
    try{
      const fn=mode==="login"?sb.auth.signInWithPassword.bind(sb.auth):sb.auth.signUp.bind(sb.auth);
      const{data,error}=await fn({email,password:pass});
      if(error)throw error;
      if(data.user)onAuth(data.user);
      else setErr("Check your email to confirm signup, then log in.");
    }catch(e){setErr(e.message);}
    setLoading(false);
  };

  return(
    <div style={{minHeight:"100vh",minHeight:"100dvh",background:BG,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:360}}>
        <div style={{marginBottom:32,textAlign:"center"}}>
          <div style={{width:48,height:48,background:A,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:900,color:"#000",margin:"0 auto 16px"}}>J</div>
          <div style={{fontSize:24,fontWeight:900,color:TX}}>Jjoo's Life OS</div>
          <div style={{fontSize:12,color:DIM,marginTop:6}}>Your second brain, synced everywhere</div>
        </div>
        <Card style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"flex",gap:6,marginBottom:4}}>
            {["login","signup"].map(m=><button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:"8px",borderRadius:8,border:"none",cursor:"pointer",background:mode===m?A:"#ffffff0a",color:mode===m?"#000":DIM,fontWeight:mode===m?800:500,fontSize:12,fontFamily:"inherit"}}>{m==="login"?"Log In":"Sign Up"}</button>)}
          </div>
          <TInput value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email" type="email"/>
          <TInput value={pass} onChange={e=>setPass(e.target.value)} placeholder="Password (min 6 chars)" type="password" onKeyDown={e=>e.key==="Enter"&&submit()}/>
          {err&&<div style={{fontSize:12,color:"#ff6b6b",background:"#ff6b6b12",padding:"8px 11px",borderRadius:8}}>{err}</div>}
          <Btn onClick={submit} style={{width:"100%",padding:"12px",fontSize:14}} >{loading?"...":(mode==="login"?"Log In →":"Create Account →")}</Btn>
        </Card>
        <div style={{textAlign:"center",fontSize:11,color:DIM,marginTop:16}}>Data syncs across all your devices</div>
      </div>
    </div>
  );
}

const DEF_EVE=[{id:"e1",time:"20:00",label:"Wrap up work",emoji:"💼",duration:15,pillar:"Career",done:false},{id:"e2",time:"20:15",label:"Plan tomorrow",emoji:"📋",duration:10,pillar:"Growth",done:false},{id:"e3",time:"20:25",label:"Connect with GF",emoji:"💌",duration:30,pillar:"Love",done:false},{id:"e4",time:"21:00",label:"Read",emoji:"📖",duration:20,pillar:"Growth",done:false},{id:"e5",time:"21:20",label:"Wind down",emoji:"🌙",duration:20,pillar:"Health",done:false},{id:"e6",time:"21:40",label:"Sleep",emoji:"😴",duration:0,pillar:"Health",done:false}];
function Routine({usePersist}){
  const[tab,setTab]=useState("morning");
  const[morning,setMorning]=usePersist("rm",DEF_MOR);
  const[evening,setEvening]=usePersist("re",DEF_EVE);
  const[custom,setCustom]=usePersist("rc",[]);
  const[editing,setEditing]=useState(null);
  const[adding,setAdding]=useState(false);
  const[newB,setNewB]=useState({time:"",label:"",emoji:"⭐",duration:15,pillar:"Health"});
  const m={morning:[morning,setMorning],evening:[evening,setEvening],custom:[custom,setCustom]};
  const[active,setActive]=m[tab];
  const done=active.filter(b=>b.done).length;const pct=active.length?Math.round(done/active.length*100):0;
  const toggle=id=>setActive(a=>a.map(b=>b.id===id?{...b,done:!b.done}:b));
  const upd=(id,f,v)=>setActive(a=>a.map(b=>b.id===id?{...b,[f]:v}:b));
  const del=id=>setActive(a=>a.filter(b=>b.id!==id));
  const add=()=>{if(!newB.label.trim())return;setActive(a=>[...a,{...newB,id:Date.now(),done:false}]);setNewB({time:"",label:"",emoji:"⭐",duration:15,pillar:"Health"});setAdding(false);};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:13}}>
      <div style={{display:"flex",gap:6}}>{["morning","evening","custom"].map(t=><button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"8px 0",borderRadius:10,border:"none",cursor:"pointer",background:tab===t?A:P2,color:tab===t?"#000":DIM,fontWeight:tab===t?800:500,fontSize:12,textTransform:"capitalize",fontFamily:"inherit"}}>{t==="morning"?"☀️ Morning":t==="evening"?"🌙 Evening":"✏️ Custom"}</button>)}</div>
      {active.length>0&&<Card style={{padding:"11px 15px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,fontWeight:700,color:TX}}>Progress</span><span style={{fontSize:14,fontWeight:900,color:pct===100?A:TX}}>{pct}%</span></div><div style={{background:MU,borderRadius:99,height:5,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:A,borderRadius:99,transition:"width 0.3s"}}/></div><div style={{fontSize:11,color:DIM,marginTop:4}}>{done}/{active.length} done {pct===100?"🎉":""}</div></Card>}
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {active.length===0&&<Card style={{textAlign:"center",color:DIM,fontSize:13,padding:"24px"}}>No blocks yet 👇</Card>}
        {active.map(b=>editing===b.id?(
          <Card key={b.id} style={{display:"flex",flexDirection:"column",gap:7,borderColor:A+"40"}}>
            <div style={{display:"flex",gap:6}}><TInput value={b.emoji} onChange={e=>upd(b.id,"emoji",e.target.value)} style={{width:44}}/><TInput value={b.time} onChange={e=>upd(b.id,"time",e.target.value)} placeholder="06:00" style={{width:68}}/><TInput value={b.label} onChange={e=>upd(b.id,"label",e.target.value)} placeholder="Block name" style={{flex:1}}/></div>
            <div style={{display:"flex",gap:6}}><TInput value={b.duration} onChange={e=>upd(b.id,"duration",e.target.value)} placeholder="mins" style={{width:68}}/><TSelect value={b.pillar} onChange={e=>upd(b.id,"pillar",e.target.value)} options={Object.keys(PCOL)} style={{flex:1}}/><Btn onClick={()=>setEditing(null)}>Save</Btn></div>
          </Card>
        ):(
          <div key={b.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:12,background:b.done?"#ffffff04":PL,border:`1px solid ${b.done?"#ffffff08":(PCOL[b.pillar]||A)+"25"}`,opacity:b.done?0.5:1}}>
            <div onClick={()=>toggle(b.id)} style={{width:20,height:20,borderRadius:6,flexShrink:0,border:`1.5px solid ${b.done?A:MU}`,background:b.done?A:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>{b.done&&<span style={{fontSize:11,color:"#000",fontWeight:900}}>✓</span>}</div>
            <span style={{fontSize:17,flexShrink:0}}>{b.emoji}</span>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:TX}}>{b.label}</div><div style={{fontSize:11,color:DIM,marginTop:1}}>{b.time&&<>{b.time} · </>}{b.duration>0&&<>{b.duration} min · </>}<span style={{color:PCOL[b.pillar]||A}}>{b.pillar}</span></div></div>
            <Btn onClick={()=>setEditing(b.id)} variant="icon" style={{fontSize:11,padding:"4px 9px"}}>✏️</Btn>
            <Btn onClick={()=>del(b.id)} variant="danger" style={{fontSize:11,padding:"4px 8px"}}>✕</Btn>
          </div>
        ))}
      </div>
      {adding?(<Card style={{borderColor:A+"30",display:"flex",flexDirection:"column",gap:7}}><SL>New Block</SL><div style={{display:"flex",gap:6}}><TInput value={newB.emoji} onChange={e=>setNewB(b=>({...b,emoji:e.target.value}))} style={{width:44}}/><TInput value={newB.time} onChange={e=>setNewB(b=>({...b,time:e.target.value}))} placeholder="06:00" style={{width:68}}/><TInput value={newB.label} onChange={e=>setNewB(b=>({...b,label:e.target.value}))} placeholder="Block name" style={{flex:1}}/></div><div style={{display:"flex",gap:6}}><TInput value={newB.duration} onChange={e=>setNewB(b=>({...b,duration:e.target.value}))} placeholder="mins" style={{width:68}}/><TSelect value={newB.pillar} onChange={e=>setNewB(b=>({...b,pillar:e.target.value}))} options={Object.keys(PCOL)} style={{flex:1}}/></div><div style={{display:"flex",gap:6}}><Btn onClick={add} style={{flex:1}}>+ Add Block</Btn><Btn onClick={()=>setAdding(false)} variant="ghost">Cancel</Btn></div></Card>):<DashedAdd onClick={()=>setAdding(true)} label="+ Add block"/>}
    </div>
  );
}

// ── MIND ──

  const add=()=>{if(!cap.trim())return;setItems(i=>[{id:Date.now(),text:cap,tag},...i]);setCap("");};
  const del=id=>setItems(i=>i.filter(x=>x.id!==id));

      </Card>

  );
}

// ── GOALS ──
const DEF_GOALS=[{id:1,title:"Save ₱50,000 emergency fund",pillar:"Money",progress:62,by:"2026-06-30",steps:8,doneSteps:5},{id:2,title:"Complete UX design course",pillar:"Growth",progress:40,by:"2026-07-15",steps:12,doneSteps:5},{id:3,title:"Run 5km without stopping",pillar:"Health",progress:75,by:"2026-05-31",steps:6,doneSteps:4},{id:4,title:"Launch freelance portfolio",pillar:"Career",progress:30,by:"2026-08-01",steps:10,doneSteps:3}];
function Goals({usePersist}){
  const[goals,setGoals]=usePersist("goals",DEF_GOALS);
  const[editing,setEditing]=useState(null);const[adding,setAdding]=useState(false);const[draft,setDraft]=useState({});const[newG,setNewG]=useState({title:"",pillar:"Health",by:"",steps:5});
  const startEdit=g=>{setDraft({...g});setEditing(g.id);};const save=()=>{setGoals(g=>g.map(x=>x.id===editing?{...draft,id:editing}:x));setEditing(null);};const del=id=>setGoals(g=>g.filter(x=>x.id!==id));

  const stepTap=(id,i)=>setGoals(g=>g.map(x=>{if(x.id!==id)return x;const d=i<x.doneSteps?i:i+1;return{...x,doneSteps:d,progress:Math.round(d/x.steps*100)};}));

      {goals.map(g=>editing===g.id?(

          <div style={{background:MU,borderRadius:99,height:5,overflow:"hidden",marginBottom:9}}><div style={{width:`${g.progress}%`,height:"100%",background:g.progress>=70?A:g.progress>=40?"#ffd166":"#ff6b6b",borderRadius:99}}/></div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>{Array.from({length:g.steps}).map((_,i)=><div key={i} onClick={()=>stepTap(g.id,i)} style={{width:26,height:26,borderRadius:7,background:i<g.doneSteps?A+"20":"#ffffff07",border:`1.5px solid ${i<g.doneSteps?A:MU}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:i<g.doneSteps?A:MU,cursor:"pointer"}}>{i<g.doneSteps?"✓":i+1}</div>)}</div>

// ── KANBAN ──
const COLS=["Todo","In Progress","Done"];const COL_CLR={"Todo":DIM,"In Progress":"#ffd166","Done":A};
const DEF_KANBAN=[{id:1,title:"Research competitors",col:"Done",proj:"Freelance Rebrand",pri:"med"},{id:2,title:"Create wireframes",col:"Done",proj:"Freelance Rebrand",pri:"high"},{id:3,title:"Design homepage",col:"In Progress",proj:"Freelance Rebrand",pri:"high"},{id:4,title:"Write copy",col:"In Progress",proj:"Freelance Rebrand",pri:"med"},{id:5,title:"Client review",col:"Todo",proj:"Freelance Rebrand",pri:"high"},{id:6,title:"Set up LinkedIn",col:"Todo",proj:"Personal Brand",pri:"med"},{id:7,title:"Write bio",col:"In Progress",proj:"Personal Brand",pri:"low"},{id:8,title:"Portfolio screenshots",col:"Todo",proj:"Personal Brand",pri:"med"}];
function Kanban({usePersist}){
  const[cards,setCards]=usePersist("kanban",DEF_KANBAN);
  const[adding,setAdding]=useState(false);const[newK,setNewK]=useState({title:"",col:"Todo",proj:"",pri:"med"});const[fp,setFp]=useState("All");
  const projs=["All",...new Set(cards.map(c=>c.proj).filter(Boolean))];
  const visible=fp==="All"?cards:cards.filter(c=>c.proj===fp);
  const move=(id,dir)=>setCards(c=>c.map(x=>{if(x.id!==id)return x;const idx=COLS.indexOf(x.col);return{...x,col:COLS[Math.min(COLS.length-1,Math.max(0,idx+dir))]};}));
  const del=id=>setCards(c=>c.filter(x=>x.id!==id));
  const add=()=>{if(!newK.title.trim())return;setCards(c=>[...c,{...newK,id:Date.now()}]);setNewK({title:"",col:"Todo",proj:newK.proj,pri:"med"});setAdding(false);};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><SL mb={0}>Kanban Board</SL><Btn onClick={()=>setAdding(a=>!a)} variant="ghost" style={{fontSize:11,padding:"5px 11px"}}>+ Add card</Btn></div>
      <div style={{display:"flex",gap:6,overflowX:"auto"}}>{projs.map(p=><button key={p} onClick={()=>setFp(p)} style={{padding:"5px 12px",borderRadius:99,border:"none",cursor:"pointer",background:fp===p?A:"#ffffff0a",color:fp===p?"#000":DIM,fontWeight:fp===p?800:500,fontSize:11,whiteSpace:"nowrap",fontFamily:"inherit"}}>{p}</button>)}</div>
      {adding&&<Card style={{borderColor:A+"30",display:"flex",flexDirection:"column",gap:8}}><SL>New Card</SL><TInput value={newK.title} onChange={e=>setNewK(k=>({...k,title:e.target.value}))} placeholder="Card title"/><div style={{display:"flex",gap:7}}><TSelect value={newK.col} onChange={e=>setNewK(k=>({...k,col:e.target.value}))} options={COLS} style={{flex:1}}/><TSelect value={newK.pri} onChange={e=>setNewK(k=>({...k,pri:e.target.value}))} options={["high","med","low"]} style={{width:90}}/></div><TInput value={newK.proj} onChange={e=>setNewK(k=>({...k,proj:e.target.value}))} placeholder="Project (optional)"/><div style={{display:"flex",gap:7}}><Btn onClick={add} style={{flex:1}}>+ Add Card</Btn><Btn onClick={()=>setAdding(false)} variant="ghost">Cancel</Btn></div></Card>}
      {COLS.map(col=>{const cc=visible.filter(c=>c.col===col);return(
        <div key={col}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><div style={{width:8,height:8,borderRadius:"50%",background:COL_CLR[col],flexShrink:0}}/><span style={{fontSize:11,fontWeight:700,color:COL_CLR[col],letterSpacing:1,textTransform:"uppercase"}}>{col}</span><span style={{fontSize:11,color:DIM}}>({cc.length})</span></div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {cc.length===0&&<div style={{padding:"12px 14px",borderRadius:10,border:`1px dashed ${MU}`,textAlign:"center",color:DIM,fontSize:12}}>Empty</div>}
            {cc.map(c=><div key={c.id} style={{padding:"11px 14px",borderRadius:11,background:PL,border:`1px solid #ffffff0a`,borderLeft:`3px solid ${COL_CLR[c.col]}`}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:TX,marginBottom:4}}>{c.title}</div><div style={{display:"flex",gap:6}}>{c.proj&&<Pill color={DIM}>{c.proj}</Pill>}<Pill color={PRICOL[c.pri]}>{c.pri}</Pill></div></div>
                <div style={{display:"flex",gap:5,flexShrink:0}}>
                  {COLS.indexOf(c.col)>0&&<button onClick={()=>move(c.id,-1)} style={{background:"#ffffff08",border:"none",borderRadius:5,padding:"3px 7px",color:DIM,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>←</button>}
                  {COLS.indexOf(c.col)<COLS.length-1&&<button onClick={()=>move(c.id,1)} style={{background:A+"20",border:"none",borderRadius:5,padding:"3px 7px",color:A,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>→</button>}
                  <Btn onClick={()=>del(c.id)} variant="danger" style={{padding:"3px 7px"}}>✕</Btn>
                </div>
              </div>
            </div>)}
          </div>
        </div>
      );})}
    </div>
  );
}

const DEF_JOUR=[{id:1,date:"May 14",title:"Productive chaos",mood:4,text:"Got a lot done today but felt scattered. Need to set better boundaries with my time..."},{id:2,date:"May 13",title:"Good day overall",mood:5,text:"Woke up early and felt good. The relationship stuff has been amazing lately..."},{id:3,date:"May 12",title:"Low energy day",mood:2,text:"Didn't accomplish much. Feeling overwhelmed but trying to be patient with myself..."}];

    </div>
  );

const DEF_SKILLS=[{id:1,name:"UI/UX Design",cat:"Design",level:3,note:"Studying on Coursera",learning:true},{id:2,name:"Figma",cat:"Design",level:3,note:"Use daily",learning:false},{id:3,name:"React / Frontend",cat:"Code",level:2,note:"Side projects ongoing",learning:true},{id:4,name:"Copywriting",cat:"Marketing",level:3,note:"Freelance work",learning:false},{id:5,name:"Personal Finance",cat:"Money",level:2,note:"Reading books on it",learning:true},{id:6,name:"Public Speaking",cat:"Soft",level:2,note:"Want to practice more",learning:false}];

function Skills({usePersist}){

      {cats.map(cat=><div key={cat}><SL>{cat}</SL><div style={{display:"flex",flexDirection:"column",gap:8}}>
        {skills.filter(s=>s.cat===cat).map(s=>editing===s.id?(
          <Card key={s.id} style={{borderColor:A+"30",display:"flex",flexDirection:"column",gap:8}}><TInput value={draft.name} onChange={e=>setDraft(d=>({...d,name:e.target.value}))} placeholder="Skill name"/><div style={{display:"flex",gap:7}}><TSelect value={draft.cat} onChange={e=>setDraft(d=>({...d,cat:e.target.value}))} options={SKILL_CATS} style={{flex:1}}/><TSelect value={draft.level} onChange={e=>setDraft(d=>({...d,level:Number(e.target.value)}))} options={[1,2,3,4,5]} style={{width:80}}/></div><TInput value={draft.note} onChange={e=>setDraft(d=>({...d,note:e.target.value}))} placeholder="Note"/><div style={{display:"flex",alignItems:"center",gap:8}}><input type="checkbox" checked={draft.learning} onChange={e=>setDraft(d=>({...d,learning:e.target.checked}))} style={{accentColor:A}}/><span style={{fontSize:12,color:DIM}}>Currently learning</span></div><div style={{display:"flex",gap:7}}><Btn onClick={save} style={{flex:1}}>Save</Btn><Btn onClick={()=>setEditing(null)} variant="ghost">Cancel</Btn></div></Card>
        ):(
          <Card key={s.id} style={{borderLeft:`3px solid ${SKILL_CLR[s.level-1]}60`}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10}}><div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}><span style={{fontSize:13,fontWeight:700,color:TX}}>{s.name}</span>{s.learning&&<Pill color={A}>learning</Pill>}</div><div style={{display:"flex",gap:5,marginBottom:6}}>{[1,2,3,4,5].map(i=><div key={i} style={{width:28,height:8,borderRadius:4,background:i<=s.level?SKILL_CLR[s.level-1]:MU}}/>)}<span style={{fontSize:11,color:SKILL_CLR[s.level-1],fontWeight:700,marginLeft:4}}>{SKILL_LEVELS[s.level-1]}</span></div>{s.note&&<div style={{fontSize:11,color:DIM}}>{s.note}</div>}</div><div style={{display:"flex",flexDirection:"column",gap:5,flexShrink:0}}><div style={{display:"flex",gap:5}}><button onClick={()=>bump(s.id,-1)} style={{background:"#ffffff08",border:"none",borderRadius:5,width:24,height:24,color:DIM,cursor:"pointer",fontSize:13}}>−</button><button onClick={()=>bump(s.id,1)} style={{background:SKILL_CLR[s.level-1]+"20",border:"none",borderRadius:5,width:24,height:24,color:SKILL_CLR[s.level-1],cursor:"pointer",fontSize:13}}>+</button></div><div style={{display:"flex",gap:5}}><Btn onClick={()=>se(s)} variant="icon" style={{fontSize:10,padding:"3px 7px"}}>✏️</Btn><Btn onClick={()=>del(s.id)} variant="danger" style={{fontSize:10,padding:"3px 7px"}}>✕</Btn></div></div></div>
          </Card>
        ))}
      </div></div>)}
      {skills.length===0&&<Card style={{textAlign:"center",color:DIM,fontSize:13,padding:"28px"}}>No skills yet 💪</Card>}
    </div>
  );
}

// ── PEOPLE ──
const DEF_PEOPLE=[{id:1,name:"GF 💌",type:"Partner",lastTouched:"Today",note:"Anniversary planning in progress",birthday:"1999-08-14",phone:"",email:"",tasks:["Plan anniversary","Send good morning text"]},{id:2,name:"Mom",type:"Family",lastTouched:"3 days ago",note:"Need to call this week",birthday:"1970-03-22",phone:"",email:"",tasks:["Call this week"]},{id:3,name:"Trisha",type:"Friend",lastTouched:"1 week ago",note:"Check in on her thesis",birthday:"2000-11-05",phone:"",email:"",tasks:[]},{id:4,name:"Mark",type:"Mentor",lastTouched:"2 weeks ago",note:"Schedule coffee meeting",birthday:"1985-07-30",phone:"",email:"",tasks:["Schedule coffee"]}];
function PersonCard({person,onChange,onRemove}){const[open,setOpen]=useState(false);const[ed,setEd]=useState(false);const[draft,setDraft]=useState(person);const[nt,setNt]=useState("");const col=TCOL[person.type]||DIM;const save=()=>{onChange(draft);setEd(false);};const addTask=()=>{if(!nt.trim())return;onChange({...person,tasks:[...(person.tasks||[]),nt.trim()]});setNt("");};const delTask=i=>onChange({...person,tasks:person.tasks.filter((_,idx)=>idx!==i)});
return(<Card style={{borderLeft:`3px solid ${col}40`}}><div style={{display:"flex",alignItems:"center",gap:11}}><div style={{width:40,height:40,borderRadius:10,flexShrink:0,background:col+"20",border:`2px solid ${col}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:700,color:col}}>{person.name[0]||"?"}</div><div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}><span style={{fontSize:14,fontWeight:700,color:TX}}>{person.name}</span><Pill color={col}>{person.type}</Pill></div><div style={{fontSize:11,color:DIM,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{person.note||"No note"}</div></div><div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:10,color:DIM}}>last touch</div><div style={{fontSize:12,fontWeight:700,color:person.lastTouched==="Today"?A:TX}}>{person.lastTouched}</div></div><button onClick={()=>setOpen(o=>!o)} style={{background:"#ffffff08",border:"none",borderRadius:6,padding:"4px 8px",color:DIM,cursor:"pointer",fontSize:12}}>{open?"▲":"▼"}</button></div>
{open&&<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #ffffff08"}}>{ed?(<div style={{display:"flex",flexDirection:"column",gap:7}}><div style={{display:"flex",gap:7}}><TInput value={draft.name} onChange={e=>setDraft(d=>({...d,name:e.target.value}))} placeholder="Name" style={{flex:1}}/><TSelect value={draft.type} onChange={e=>setDraft(d=>({...d,type:e.target.value}))} options={Object.keys(TCOL)} style={{width:110}}/></div><TSelect value={draft.lastTouched} onChange={e=>setDraft(d=>({...d,lastTouched:e.target.value}))} options={TOUCH}/><TInput value={draft.note} onChange={e=>setDraft(d=>({...d,note:e.target.value}))} placeholder="Note"/><TInput value={draft.birthday} onChange={e=>setDraft(d=>({...d,birthday:e.target.value}))} type="date"/><TInput value={draft.phone} onChange={e=>setDraft(d=>({...d,phone:e.target.value}))} placeholder="Phone"/><TInput value={draft.email} onChange={e=>setDraft(d=>({...d,email:e.target.value}))} placeholder="Email"/><div style={{display:"flex",gap:7}}><Btn onClick={save} style={{flex:1}}>Save</Btn><Btn onClick={()=>setEd(false)} variant="ghost">Cancel</Btn></div></div>):(<div style={{display:"flex",flexDirection:"column",gap:9}}><div style={{display:"flex",flexDirection:"column",gap:5}}>{person.birthday&&<Row2 icon="🎂" val={new Date(person.birthday+"T00:00:00").toLocaleDateString("en-PH",{month:"long",day:"numeric",year:"numeric"})}/>}{person.phone&&<Row2 icon="📞" val={person.phone}/>}{person.email&&<Row2 icon="✉️" val={person.email}/>}</div><div><div style={{fontSize:10,color:DIM,letterSpacing:2,textTransform:"uppercase",marginBottom:7,fontWeight:600}}>Tasks</div>{(person.tasks||[]).map((t,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:P2,borderRadius:7,marginBottom:5}}><span style={{flex:1,fontSize:12,color:TX}}>{t}</span><Btn onClick={()=>delTask(i)} variant="danger" style={{padding:"2px 7px"}}>×</Btn></div>)}<div style={{display:"flex",gap:7,marginTop:5}}><TInput value={nt} onChange={e=>setNt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask()} placeholder="Add a task..." style={{flex:1}}/><Btn onClick={addTask} style={{padding:"8px 11px"}}>+</Btn></div></div><div style={{display:"flex",gap:7,flexWrap:"wrap"}}><Btn onClick={()=>onChange({...person,lastTouched:"Today"})} variant="ghost" style={{fontSize:11}}>✓ Touched today</Btn><Btn onClick={()=>{setDraft(person);setEd(true);}} variant="ghost" style={{fontSize:11}}>✏️ Edit</Btn><Btn onClick={onRemove} variant="danger" style={{fontSize:11}}>Remove</Btn></div></div>)}</div>}</Card>);}

function People({usePersist}){
  const[people,setPeople]=usePersist("people",DEF_PEOPLE);const[bdays,setBdays]=usePersist("bdays",[]);const[view,setView]=useState("contacts");const[addOpen,setAddOpen]=useState(false);const[newP,setNewP]=useState({name:"",type:"Friend",lastTouched:"Today",note:"",birthday:"",phone:"",email:"",tasks:[]});const[addBday,setAddBday]=useState(false);const[editBdayId,setEditBdayId]=useState(null);const[newBday,setNewBday]=useState({name:"",birthday:"",type:"Friend"});const[bdayDraft,setBdayDraft]=useState({});
  const update=(id,u)=>setPeople(p=>p.map(x=>x.id===id?{...u,id}:x));const remove=id=>setPeople(p=>p.filter(x=>x.id!==id));
  const addPerson=()=>{if(!newP.name.trim())return;setPeople(p=>[...p,{...newP,id:Date.now(),tasks:[]}]);setNewP({name:"",type:"Friend",lastTouched:"Today",note:"",birthday:"",phone:"",email:"",tasks:[]});setAddOpen(false);};
  const saveBday=()=>{setBdays(b=>b.map(x=>x.id===editBdayId?{...bdayDraft,id:editBdayId}:x));setEditBdayId(null);};const delBday=id=>setBdays(b=>b.filter(x=>x.id!==id));const addBdayEntry=()=>{if(!newBday.name.trim()||!newBday.birthday)return;setBdays(b=>[...b,{...newBday,id:Date.now()}]);setNewBday({name:"",birthday:"",type:"Friend"});setAddBday(false);};
  const today=new Date();const allBdays=[...people.filter(p=>p.birthday).map(p=>({id:p.id,name:p.name,birthday:p.birthday,type:p.type,isContact:true})),...bdays.map(b=>({...b,isContact:false}))].map(p=>{const bd=new Date(p.birthday+"T00:00:00");const next=new Date(today.getFullYear(),bd.getMonth(),bd.getDate());if(next<today)next.setFullYear(today.getFullYear()+1);const days=Math.round((next-today)/86400000);const age=today.getFullYear()-bd.getFullYear()-(today<next?1:0);return{...p,days,age};}).sort((a,b)=>a.days-b.days);
  return(<div style={{display:"flex",flexDirection:"column",gap:12}}>
    <div style={{display:"flex",gap:6}}>{["contacts","birthdays"].map(t=><button key={t} onClick={()=>setView(t)} style={{flex:1,padding:"8px 0",borderRadius:10,border:"none",cursor:"pointer",background:view===t?A:P2,color:view===t?"#000":DIM,fontWeight:view===t?800:500,fontSize:12,fontFamily:"inherit"}}>{t==="contacts"?"👥 Contacts":"🎂 Birthdays"}</button>)}</div>
    {view==="contacts"&&<><SL>{people.length} contacts · tap ▼ to expand</SL>{people.map(p=><PersonCard key={p.id} person={p} onChange={u=>update(p.id,u)} onRemove={()=>remove(p.id)}/>)}{addOpen?(<Card style={{borderColor:A+"30",display:"flex",flexDirection:"column",gap:7}}><SL>New Contact</SL><div style={{display:"flex",gap:7}}><TInput value={newP.name} onChange={e=>setNewP(p=>({...p,name:e.target.value}))} placeholder="Name" style={{flex:1}}/><TSelect value={newP.type} onChange={e=>setNewP(p=>({...p,type:e.target.value}))} options={Object.keys(TCOL)} style={{width:110}}/></div><TInput value={newP.birthday} onChange={e=>setNewP(p=>({...p,birthday:e.target.value}))} type="date"/><TInput value={newP.phone} onChange={e=>setNewP(p=>({...p,phone:e.target.value}))} placeholder="Phone"/><TInput value={newP.email} onChange={e=>setNewP(p=>({...p,email:e.target.value}))} placeholder="Email"/><TInput value={newP.note} onChange={e=>setNewP(p=>({...p,note:e.target.value}))} placeholder="Note"/><div style={{display:"flex",gap:7}}><Btn onClick={addPerson} style={{flex:1}}>+ Add Contact</Btn><Btn onClick={()=>setAddOpen(false)} variant="ghost">Cancel</Btn></div></Card>):<DashedAdd onClick={()=>setAddOpen(true)} label="+ Add contact"/>}</>}
    {view==="birthdays"&&<><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><SL mb={0}>Upcoming Birthdays</SL><Btn onClick={()=>setAddBday(a=>!a)} variant="ghost" style={{fontSize:11,padding:"5px 11px"}}>+ Add birthday</Btn></div>{addBday&&<Card style={{borderColor:A+"30",display:"flex",flexDirection:"column",gap:8}}><SL>New Birthday</SL><TInput value={newBday.name} onChange={e=>setNewBday(b=>({...b,name:e.target.value}))} placeholder="Name"/><TInput value={newBday.birthday} onChange={e=>setNewBday(b=>({...b,birthday:e.target.value}))} type="date"/><TSelect value={newBday.type} onChange={e=>setNewBday(b=>({...b,type:e.target.value}))} options={Object.keys(TCOL)}/><div style={{display:"flex",gap:7}}><Btn onClick={addBdayEntry} style={{flex:1}}>+ Add</Btn><Btn onClick={()=>setAddBday(false)} variant="ghost">Cancel</Btn></div></Card>}{allBdays.length===0&&<Card style={{textAlign:"center",color:DIM,fontSize:13,padding:"24px"}}>No birthdays yet 🎂</Card>}{allBdays.map(p=>editBdayId===p.id&&!p.isContact?(<Card key={p.id} style={{borderColor:A+"30",display:"flex",flexDirection:"column",gap:8}}><SL>Edit Birthday</SL><TInput value={bdayDraft.name} onChange={e=>setBdayDraft(d=>({...d,name:e.target.value}))} placeholder="Name"/><TInput value={bdayDraft.birthday} onChange={e=>setBdayDraft(d=>({...d,birthday:e.target.value}))} type="date"/><TSelect value={bdayDraft.type} onChange={e=>setBdayDraft(d=>({...d,type:e.target.value}))} options={Object.keys(TCOL)}/><div style={{display:"flex",gap:7}}><Btn onClick={saveBday} style={{flex:1}}>Save</Btn><Btn onClick={()=>setEditBdayId(null)} variant="ghost">Cancel</Btn></div></Card>):(<Card key={p.id} style={{display:"flex",alignItems:"center",gap:13,borderLeft:`3px solid ${TCOL[p.type]||DIM}`}}><div style={{textAlign:"center",minWidth:44}}><div style={{fontSize:21,fontWeight:900,color:p.days<=7?A:TX}}>{p.days}</div><div style={{fontSize:9,color:DIM,letterSpacing:1}}>DAYS</div></div><div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:7,marginBottom:2,flexWrap:"wrap"}}><span style={{fontSize:14,fontWeight:700,color:TX}}>{p.name}</span>{p.days===0&&<span style={{fontSize:10,background:A+"20",color:A,padding:"2px 7px",borderRadius:99,fontWeight:700}}>TODAY 🎉</span>}{p.days<=7&&p.days>0&&<span style={{fontSize:10,background:"#ffd16620",color:"#ffd166",padding:"2px 7px",borderRadius:99,fontWeight:700}}>soon!</span>}{p.isContact&&<Pill color={DIM}>contact</Pill>}</div><div style={{fontSize:11,color:DIM}}>{new Date(p.birthday+"T00:00:00").toLocaleDateString("en-PH",{month:"long",day:"numeric"})} · turning {p.age+1}</div></div><div style={{display:"flex",flexDirection:"column",gap:5,alignItems:"flex-end"}}><div style={{fontSize:22}}>🎂</div>{!p.isContact&&<div style={{display:"flex",gap:5}}><Btn onClick={()=>{setBdayDraft({name:p.name,birthday:p.birthday,type:p.type});setEditBdayId(p.id);}} variant="icon" style={{fontSize:10,padding:"3px 7px"}}>✏️</Btn><Btn onClick={()=>delBday(p.id)} variant="danger" style={{fontSize:10,padding:"3px 7px"}}>✕</Btn></div>}{p.isContact&&<span style={{fontSize:10,color:DIM}}>edit in Contacts</span>}</div></Card>))}</>}
  </div>);}

// ── NAV ──
const NAV=[{id:"home",icon:"⌂",label:"Home"},{id:"habits",icon:"🔥",label:"Habits"},{id:"routine",icon:"◷",label:"Routine"},{id:"mind",icon:"◈",label:"Mind"},{id:"goals",icon:"◎",label:"Goals"},{id:"kanban",icon:"▦",label:"Kanban"},{id:"projects",icon:"◩",label:"Projects"},{id:"journal",icon:"◻",label:"Journal"},{id:"finance",icon:"◬",label:"Finance"},{id:"skills",icon:"★",label:"Skills"},{id:"people",icon:"❋",label:"People"}];
const PAGE_MAP={home:Home,habits:Habits,routine:Routine,mind:Mind,goals:Goals,kanban:Kanban,projects:Projects,journal:Journal,finance:Finance,skills:Skills,people:People};

// ── ROOT ──
function App(){
  const[user,setUser]=useState(null);
  const[checking,setChecking]=useState(true);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user||null);setChecking(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{setUser(session?.user||null);});
    return()=>subscription.unsubscribe();
  },[]);

  if(checking)return<div style={{minHeight:"100vh",minHeight:"100dvh",background:BG,display:"flex",alignItems:"center",justifyContent:"center",color:DIM,fontSize:13}}>Loading...</div>;
  if(!user)return<AuthScreen onAuth={setUser}/>;
  return<MainApp user={user}/>;
}

function MainApp({user}){
  const[active,setActive]=useState("home");
  const syncCtx=useSync(user.id);
  const usePersist=makePersist(syncCtx);
  const Page=PAGE_MAP[active];

  const syncIcon=syncCtx.syncStatus==="saving"?"⟳":syncCtx.syncStatus==="synced"?"✓":"!";
  const syncColor=syncCtx.syncStatus==="saving"?A:syncCtx.syncStatus==="synced"?A:"#ff6b6b";

  if(!syncCtx.synced)return<div style={{minHeight:"100vh",minHeight:"100dvh",background:BG,display:"flex",alignItems:"center",justifyContent:"center",color:DIM,fontSize:13}}>Loading your data...</div>;

  return(
    <div style={{minHeight:"100vh",minHeight:"100dvh",background:BG,display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",borderBottom:"1px solid #ffffff08",background:"#111",paddingTop:"max(10px,env(safe-area-inset-top))"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:24,height:24,background:A,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900,color:"#000"}}>J</div><span style={{fontSize:12,fontWeight:700,color:TX,letterSpacing:1}}>JJOO'S LIFE OS</span></div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:10,color:syncColor,fontWeight:700}}>{syncIcon} {syncCtx.syncStatus}</span>
          <button onClick={()=>sb.auth.signOut()} style={{background:"#ffffff08",border:"none",borderRadius:6,padding:"4px 10px",color:DIM,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>Sign out</button>
        </div>
      </div>
      <div style={{display:"flex",overflowX:"auto",gap:2,padding:"8px 10px",borderBottom:"1px solid #ffffff08",background:"#111"}}>
        {NAV.map(n=><button key={n.id} onClick={()=>setActive(n.id)} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 10px",borderRadius:8,border:"none",cursor:"pointer",background:active===n.id?A:"transparent",color:active===n.id?"#000":DIM,fontWeight:active===n.id?800:500,fontSize:11,whiteSpace:"nowrap",fontFamily:"inherit"}}><span>{n.icon}</span><span>{n.label}</span></button>)}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 15px",paddingBottom:"max(16px,env(safe-area-inset-bottom))"}}>
        <Page usePersist={usePersist}/>
      </div>
      <div style={{padding:"8px 16px",borderTop:"1px solid #ffffff08",background:"#111",display:"flex",justifyContent:"space-between",fontSize:10,color:"#ffffff20",paddingBottom:"max(8px,env(safe-area-inset-bottom))"}}>
        <span>Life OS v8.0</span><span>11 sections · synced ☁️</span>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
